name: scan_bi
description: Personal finance app with receipt scanning, multi-currency, and real-time monthly insights.
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  drift: ^2.18.0
  drift_flutter: ^0.2.0
  sqlite3_flutter_libs: ^0.5.22
  go_router: ^14.0.0
  google_mlkit_text_recognition: ^0.13.0
  image_picker: ^1.1.2
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  google_sign_in: ^6.2.1
  cloud_firestore: ^5.2.0
  uuid: ^4.4.0
  intl: ^0.19.0
  http: ^1.2.2
  path_provider: ^2.1.3
  shared_preferences: ^2.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.4.11
  drift_dev: ^2.18.0
  riverpod_generator: ^2.4.3
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
